services:
  postgres:
    image: postgres:16-alpine
    container_name: casarespuestos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-casarespuestos_dev}
      POSTGRES_USER: ${DB_USER:-casarespuestos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-casarespuestos_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-casarespuestos} -d ${DB_NAME:-casarespuestos_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
